<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My blog card</title>
</head>
<body>
    <main class="card">
        <figure>
            <img src="/assets/images/illustration-article.svg" alt="design image" width="279px" height="200px" class="picture">
        </figure>
        <section>
            <header>
                <p class="category">Learning</p>
                <p class="publish_date" type="date">Published 21 Dec 2023</p>
            </header>
            <article>
                <h1>HTML & CSS foundations</h1>
                <p class="card_description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
            </article>
        </section>
        <footer>
            <img src="" alt="portrait's redactor" width="" height="" class="portrait">
            <p class="redactor">Greg Hooper</p>
        </footer>
    </main>
</body>
</html>
