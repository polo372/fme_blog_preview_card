<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My blog card</title>
</head>
<body>
    <main class="card">
        <figure>
            <img src="/assets/images/illustration-article.svg" alt="design image" class="picture">
        </figure>
        <section>
            <header>
                <p class="category">Learning</p>
                <p class="publish_date"><time datetime="2023-12-21">Published 21 Dec 2023</time></p>
            </header>
            <article>
                <a><h2 class="titre">HTML & CSS foundations</h2></a>
                <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
            </article>
        </section>
        <footer>
            <img src="/assets/images/image-avatar.webp" alt="portrait's redactor" width="32px" height="32px" class="portrait">
            <p class="authorname">Greg Hooper</p>
        </footer>
    </main>
</body>
</html>
